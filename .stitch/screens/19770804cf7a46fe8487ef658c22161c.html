<!DOCTYPE html>

<html class="dark" lang="zh"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chat Home - Premium AI Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700&amp;family=Space+Grotesk:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#1b1b1e",
                        "primary-fixed-dim": "#c0c1ff",
                        "inverse-surface": "#e5e1e4",
                        "on-secondary": "#303033",
                        "surface-variant": "#353437",
                        "inverse-on-surface": "#313032",
                        "on-tertiary-container": "#452000",
                        "primary-fixed": "#e1e0ff",
                        "on-secondary-fixed-variant": "#47464a",
                        "on-tertiary-fixed-variant": "#703700",
                        "on-background": "#e5e1e4",
                        "surface": "#131315",
                        "background": "#131315",
                        "on-tertiary": "#4f2500",
                        "outline": "#908fa0",
                        "surface-bright": "#39393b",
                        "surface-container-high": "#2a2a2c",
                        "on-surface-variant": "#c7c4d7",
                        "surface-container-lowest": "#0e0e10",
                        "tertiary": "#ffb783",
                        "tertiary-fixed-dim": "#ffb783",
                        "tertiary-container": "#d97721",
                        "on-primary-container": "#0d0096",
                        "surface-container-highest": "#353437",
                        "on-surface": "#e5e1e4",
                        "primary-container": "#8083ff",
                        "on-primary-fixed": "#07006c",
                        "on-secondary-container": "#b6b4b8",
                        "surface-container": "#201f22",
                        "on-tertiary-fixed": "#301400",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "secondary-fixed-dim": "#c8c5ca",
                        "surface-tint": "#c0c1ff",
                        "secondary": "#c8c5ca",
                        "surface-container-low": "#1c1b1d",
                        "surface-dim": "#131315",
                        "on-error": "#690005",
                        "error-container": "#93000a",
                        "on-primary": "#1000a9",
                        "tertiary-fixed": "#ffdcc5",
                        "secondary-fixed": "#e4e1e6",
                        "error": "#ffb4ab",
                        "on-error-container": "#ffdad6",
                        "primary": "#c0c1ff",
                        "outline-variant": "#464554",
                        "inverse-primary": "#494bd6",
                        "secondary-container": "#47464a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "unit": "4px",
                        "sm": "8px",
                        "md": "16px",
                        "gutter": "16px",
                        "safe-margin": "20px",
                        "xs": "4px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "label-md": ["inter"],
                        "code": ["spaceGrotesk"],
                        "body-lg": ["inter"],
                        "h1": ["manrope"],
                        "body-md": ["inter"],
                        "h2": ["manrope"]
                    },
                    "fontSize": {
                        "label-md": ["13px", {"lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "code": ["14px", {"lineHeight": "22px", "fontWeight": "400"}],
                        "body-lg": ["17px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "h1": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-md": ["15px", {"lineHeight": "25px", "fontWeight": "400"}],
                        "h2": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .glass-border-b {
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body-md antialiased min-h-screen flex flex-col overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container relative">
<!-- Rotated Title -->
<div class="fixed left-0 top-0 bottom-0 w-safe-margin flex items-center justify-center z-40 bg-surface/50 backdrop-blur-sm border-r border-outline-variant/30">
<h1 class="font-h1 text-h1 text-on-surface vertical-text tracking-widest uppercase opacity-20">对话</h1>
</div>
<div class="pl-safe-margin flex flex-col min-h-screen">
<!-- Header Controls -->
<header class="sticky top-0 z-50 glass-panel px-md pt-safe-margin pb-md border-b-0 border-l-0 border-r-0">
<div class="flex items-center justify-between">
<p class="font-body-md text-body-md text-on-surface-variant">你的智能助手团队</p>
<button class="w-[48px] h-[48px] rounded-[16px] glass-panel flex items-center justify-center text-on-surface hover:bg-surface-container-highest transition-colors focus:outline-none focus:ring-2 focus:ring-primary">
<span class="material-symbols-outlined" data-icon="add" style="font-size: 24px;">add</span>
</button>
</div>
</header>
<!-- Bento Grid -->
<main class="flex-1 px-md py-md pb-[100px]">
<div class="grid grid-cols-2 gap-sm auto-rows-[120px]">
<!-- Super Assistant (2x2) -->
<div class="col-span-2 row-span-2 glass-panel rounded-xl p-lg flex flex-col group hover:bg-surface-container-low transition-colors cursor-pointer relative overflow-hidden">
<div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
<button class="w-8 h-8 rounded-full flex items-center justify-center text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined" data-icon="push_pin" style="font-size: 18px;">push_pin</span>
</button>
</div>
<div class="w-[64px] h-[64px] rounded-[20px] bg-primary-container text-on-primary-container flex items-center justify-center mb-auto shadow-lg">
<span class="material-symbols-outlined" data-icon="smart_toy" style="font-size: 32px;">smart_toy</span>
</div>
<div class="mt-4">
<h2 class="font-h1 text-h1 text-on-surface">超级助手</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-1">全能型任务专家</p>
</div>
</div>
<!-- Code Assistant -->
<div class="col-span-1 row-span-1 glass-panel rounded-xl p-md flex flex-col justify-between group hover:bg-surface-container-low transition-colors cursor-pointer relative">
<div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
<button class="w-6 h-6 rounded-full flex items-center justify-center text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined" data-icon="push_pin" style="font-size: 16px;">push_pin</span>
</button>
</div>
<div class="w-[40px] h-[40px] rounded-[12px] bg-tertiary-container text-on-tertiary-container flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="code" style="font-size: 20px;">code</span>
</div>
<div>
<h2 class="font-h2 text-h2 text-on-surface truncate">代码助手</h2>
<p class="font-label-md text-label-md text-on-surface-variant truncate mt-xs">精通多门编程语言</p>
</div>
</div>
<!-- Translation Assistant -->
<div class="col-span-1 row-span-1 glass-panel rounded-xl p-md flex flex-col justify-between group hover:bg-surface-container-low transition-colors cursor-pointer relative">
<div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
<button class="w-6 h-6 rounded-full flex items-center justify-center text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined" data-icon="push_pin" style="font-size: 16px;">push_pin</span>
</button>
</div>
<div class="w-[40px] h-[40px] rounded-[12px] bg-secondary-container text-on-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="translate" style="font-size: 20px;">translate</span>
</div>
<div>
<h2 class="font-h2 text-h2 text-on-surface truncate">翻译助手</h2>
<p class="font-label-md text-label-md text-on-surface-variant truncate mt-xs">多语言实时翻译</p>
</div>
</div>
<!-- Search Tile -->
<div class="col-span-1 row-span-1 glass-panel rounded-xl p-md flex items-center justify-center group hover:bg-surface-container-low transition-all cursor-text relative overflow-hidden focus-within:col-span-2 focus-within:justify-start">
<span class="material-symbols-outlined text-outline absolute left-md transition-all group-focus-within:left-md group-focus-within:text-primary" data-icon="search" style="font-size: 28px;">search</span>
<input class="bg-transparent border-none w-full h-full text-on-surface placeholder:text-outline font-body-md text-body-md focus:ring-0 p-0 pl-[40px] opacity-0 focus:opacity-100 absolute inset-0 cursor-text transition-opacity" placeholder="搜索助手..." type="text"/>
</div>
</div>
</main>
<!-- FAB -->
<button class="fixed bottom-[96px] right-safe-margin w-[56px] h-[56px] rounded-full bg-primary text-on-primary flex items-center justify-center shadow-lg hover:shadow-xl transition-shadow focus:outline-none focus:ring-4 focus:ring-primary-container z-40" style="box-shadow: 0 4px 6px -1px rgba(192, 193, 255, 0.1), 0 2px 4px -1px rgba(192, 193, 255, 0.06);">
<span class="material-symbols-outlined" data-icon="auto_awesome" style="font-size: 24px; font-variation-settings: 'FILL' 1;">auto_awesome</span>
</button>
<!-- Shared BottomNavBar -->
<div class="fixed bottom-0 left-0 right-0 z-50">
<div class="flex gap-2 border-t border-outline-variant bg-surface-container px-4 pb-6 pt-3 glass-panel">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-on-surface-variant hover:text-on-surface transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" data-icon="home" style="font-size: 24px;">home</span>
</div>
<p class="font-label-md text-label-md">首页</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center bg-surface-container-highest rounded-full w-16">
<span class="material-symbols-outlined" data-icon="chat" style="font-size: 24px; font-variation-settings: 'FILL' 1;">chat</span>
</div>
<p class="font-label-md text-label-md">对话</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-on-surface-variant hover:text-on-surface transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" data-icon="person" style="font-size: 24px;">person</span>
</div>
<p class="font-label-md text-label-md">我的</p>
</a>
</div>
</div>
</div>
</body></html>
