<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Folder Detail - Premium AI Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Manrope:wght@600;700&amp;family=Space+Grotesk:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#ffb783",
                        "outline-variant": "#464554",
                        "primary-fixed-dim": "#c0c1ff",
                        "inverse-surface": "#e5e1e4",
                        "error": "#ffb4ab",
                        "on-secondary-fixed": "#1b1b1e",
                        "on-tertiary": "#4f2500",
                        "on-error": "#690005",
                        "on-primary-fixed": "#07006c",
                        "background": "#131315",
                        "on-primary": "#1000a9",
                        "on-background": "#e5e1e4",
                        "on-surface-variant": "#c7c4d7",
                        "secondary-container": "#47464a",
                        "secondary": "#c8c5ca",
                        "secondary-fixed": "#e4e1e6",
                        "on-secondary": "#303033",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "on-primary-container": "#0d0096",
                        "on-surface": "#e5e1e4",
                        "outline": "#908fa0",
                        "on-secondary-container": "#b6b4b8",
                        "tertiary-fixed": "#ffdcc5",
                        "primary": "#c0c1ff",
                        "surface-dim": "#131315",
                        "on-tertiary-fixed": "#301400",
                        "surface-tint": "#c0c1ff",
                        "on-secondary-fixed-variant": "#47464a",
                        "on-error-container": "#ffdad6",
                        "surface-bright": "#39393b",
                        "inverse-on-surface": "#313032",
                        "tertiary-container": "#d97721",
                        "surface-container": "#201f22",
                        "surface": "#131315",
                        "surface-container-highest": "#353437",
                        "surface-container-low": "#1c1b1d",
                        "on-tertiary-fixed-variant": "#703700",
                        "inverse-primary": "#494bd6",
                        "primary-container": "#8083ff",
                        "surface-variant": "#353437",
                        "tertiary-fixed-dim": "#ffb783",
                        "surface-container-high": "#2a2a2c",
                        "primary-fixed": "#e1e0ff",
                        "surface-container-lowest": "#0e0e10",
                        "error-container": "#93000a",
                        "on-tertiary-container": "#452000",
                        "secondary-fixed-dim": "#c8c5ca"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "gutter": "16px",
                        "sm": "8px",
                        "xl": "32px",
                        "safe-margin": "20px",
                        "xs": "4px",
                        "unit": "4px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "h2": ["manrope"],
                        "label-md": ["inter"],
                        "body-md": ["inter"],
                        "h1": ["manrope"],
                        "code": ["spaceGrotesk"],
                        "body-lg": ["inter"]
                    },
                    "fontSize": {
                        "h2": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-md": ["13px", { "lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "body-md": ["15px", { "lineHeight": "25px", "fontWeight": "400" }],
                        "h1": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "code": ["14px", { "lineHeight": "22px", "fontWeight": "400" }],
                        "body-lg": ["17px", { "lineHeight": "26px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background-color: rgba(28, 27, 29, 0.7); /* surface-container-low */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(144, 143, 160, 0.2); /* outline */
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased h-screen flex flex-col overflow-hidden">
<!-- Main Content Area -->
<div class="relative flex h-full w-full flex-col overflow-y-auto pb-[120px]" style="--checkbox-tick-svg: url('data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27rgb(255,255,255)%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3cpath d=%27M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z%27/%3e%3c/svg%3e');">
<!-- Shared Header adapted to Theme -->
<div class="flex items-center bg-background/90 backdrop-blur-md p-4 pb-2 justify-between sticky top-0 z-10 border-b-[0.5px] border-outline-variant/30">
<div class="text-on-background flex size-12 shrink-0 items-center" data-icon="ArrowLeft" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined">arrow_left</span>
</div>
<h2 class="text-on-background font-h2 leading-tight tracking-[-0.015em] flex-1">Folder Name</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 bg-transparent text-on-background gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0">
<div class="text-on-background" data-icon="BatteryPlusVertical" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined">battery_plus</span>
</div>
</button>
</div>
</div>
<!-- Search Bar -->
<div class="px-safe-margin py-3">
<label class="flex flex-col min-w-40 h-[48px] w-full">
<div class="flex w-full flex-1 items-stretch rounded-[1rem] h-full border-[0.5px] border-outline-variant/50 overflow-hidden bg-surface-container shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)]">
<div class="text-on-surface-variant flex border-none items-center justify-center pl-4 rounded-l-[1rem]" data-icon="MagnifyingGlass" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined">magnification_large</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden text-on-background focus:outline-0 focus:ring-0 border-none bg-transparent h-full placeholder:text-on-surface-variant px-4 rounded-l-none pl-2 font-body-md" placeholder="Search in folder" value=""/>
</div>
</label>
</div>
<!-- Document List -->
<div class="px-safe-margin flex flex-col gap-sm">
<!-- Item 1: Indexed -->
<div class="flex items-center gap-4 bg-surface-container/50 backdrop-blur-sm p-3 min-h-[72px] justify-between rounded-[1rem] border-[0.5px] border-outline-variant/30">
<div class="flex items-center gap-4">
<div class="text-on-background flex items-center justify-center rounded-lg bg-surface-variant shrink-0 size-12" data-icon="Paragraph" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined">format_paragraph</span>
</div>
<div class="flex flex-col justify-center">
<p class="text-on-background font-body-md font-medium leading-normal line-clamp-1">Project Proposal.pdf</p>
<div class="flex items-center gap-2 mt-xs">
<span class="w-2 h-2 rounded-full bg-primary"></span>
<p class="text-on-surface-variant font-label-md font-normal leading-normal line-clamp-1">Indexed - 2.4 MB</p>
</div>
</div>
</div>
<div class="shrink-0">
<div class="flex size-7 items-center justify-center">
<input checked="" class="h-5 w-5 rounded border-outline-variant border-[1.5px] bg-transparent text-primary checked:bg-primary checked:border-primary checked:bg-[image:--checkbox-tick-svg] focus:ring-0 focus:ring-offset-0 focus:outline-none cursor-pointer" type="checkbox"/>
</div>
</div>
</div>
<!-- Item 2: Processing -->
<div class="flex items-center gap-4 bg-surface-container/50 backdrop-blur-sm p-3 min-h-[72px] justify-between rounded-[1rem] border-[0.5px] border-outline-variant/30">
<div class="flex items-center gap-4">
<div class="text-on-background flex items-center justify-center rounded-lg bg-surface-variant shrink-0 size-12" data-icon="Paragraph" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined">format_paragraph</span>
</div>
<div class="flex flex-col justify-center">
<p class="text-on-background font-body-md font-medium leading-normal line-clamp-1">Meeting Notes.docx</p>
<div class="flex items-center gap-2 mt-xs">
<span class="w-2 h-2 rounded-full bg-tertiary"></span>
<p class="text-on-surface-variant font-label-md font-normal leading-normal line-clamp-1">Processing - 1.1 MB</p>
</div>
</div>
</div>
<div class="shrink-0">
<div class="flex size-7 items-center justify-center">
<input class="h-5 w-5 rounded border-outline-variant border-[1.5px] bg-transparent text-primary checked:bg-primary checked:border-primary checked:bg-[image:--checkbox-tick-svg] focus:ring-0 focus:ring-offset-0 focus:outline-none cursor-pointer" type="checkbox"/>
</div>
</div>
</div>
<!-- Item 3: Error -->
<div class="flex items-center gap-4 bg-surface-container/50 backdrop-blur-sm p-3 min-h-[72px] justify-between rounded-[1rem] border-[0.5px] border-outline-variant/30">
<div class="flex items-center gap-4">
<div class="text-on-background flex items-center justify-center rounded-lg bg-surface-variant shrink-0 size-12" data-icon="Paragraph" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined">format_paragraph</span>
</div>
<div class="flex flex-col justify-center">
<p class="text-on-background font-body-md font-medium leading-normal line-clamp-1">Invoice_Q3.pdf</p>
<div class="flex items-center gap-2 mt-xs">
<span class="w-2 h-2 rounded-full bg-error"></span>
<p class="text-on-surface-variant font-label-md font-normal leading-normal line-clamp-1">Error - 450 KB</p>
</div>
</div>
</div>
<div class="shrink-0">
<div class="flex size-7 items-center justify-center">
<input checked="" class="h-5 w-5 rounded border-outline-variant border-[1.5px] bg-transparent text-primary checked:bg-primary checked:border-primary checked:bg-[image:--checkbox-tick-svg] focus:ring-0 focus:ring-offset-0 focus:outline-none cursor-pointer" type="checkbox"/>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Multi-select Toolbar (Glassmorphism) -->
<div class="fixed bottom-0 left-0 w-full glass-panel pt-md pb-safe-margin px-safe-margin rounded-t-[1.5rem] z-20">
<div class="flex justify-between items-center mb-sm px-xs">
<span class="text-on-surface-variant font-label-md">2 items selected</span>
<button class="text-primary font-label-md font-medium hover:text-primary-fixed transition-colors">Clear all</button>
</div>
<div class="flex gap-sm">
<button class="flex-1 h-[48px] rounded-lg bg-surface-container/80 flex items-center justify-center gap-xs border-[0.5px] border-outline-variant/50 hover:bg-surface-container transition-colors shadow-[inset_0_1px_2px_rgba(255,255,255,0.05)]">
<span class="material-symbols-outlined text-[20px] text-on-surface">drive_file_move</span>
<span class="text-on-surface font-label-md">Move</span>
</button>
<button class="flex-1 h-[48px] rounded-lg bg-surface-container/80 flex items-center justify-center gap-xs border-[0.5px] border-outline-variant/50 hover:bg-surface-container transition-colors shadow-[inset_0_1px_2px_rgba(255,255,255,0.05)]">
<span class="material-symbols-outlined text-[20px] text-on-surface">autorenew</span>
<span class="text-on-surface font-label-md">Re-index</span>
</button>
<button class="flex-1 h-[48px] rounded-lg bg-error/10 flex items-center justify-center gap-xs border-[0.5px] border-error/30 hover:bg-error/20 transition-colors">
<span class="material-symbols-outlined text-[20px] text-error">delete</span>
<span class="text-error font-label-md">Delete</span>
</button>
</div>
</div>
</body></html>
