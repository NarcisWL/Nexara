<!DOCTYPE html>

<html class="dark" lang="zh"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chat Home - Premium AI Interface</title>

                        "sm": "8px",

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .glass-border-b {
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .semi-circle-header {
            border-radius: 0 0 50% 50% / 0 0 30px 30px;
        }
        .orbit-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            border-radius: 50%;
        }
        .orbit-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .orbit-item {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
            transition: all 0.5s ease-in-out;
        }
        /* Positions for orbiting items */
        .orbit-item:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg) translateY(-120px) rotate(0deg); }
        .orbit-item:nth-child(2) { transform: translate(-50%, -50%) rotate(120deg) translateY(-120px) rotate(-120deg); }
        .orbit-item:nth-child(3) { transform: translate(-50%, -50%) rotate(240deg) translateY(-120px) rotate(-240deg); }

        .glow-effect {
            box-shadow: 0 0 30px rgba(192, 193, 255, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body-md antialiased min-h-screen flex flex-col overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- GlassHeader (Semi-circular) -->
<header class="sticky top-0 z-50 glass-panel px-safe-margin pt-safe-margin pb-lg semi-circle-header mb-xl shadow-lg">
<div class="flex flex-col items-center mb-sm">
<h1 class="font-h1 text-h1 text-on-surface mb-xs">对话</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-md">你的智能助手团队</p>
</div>
<!-- Search bar -->
<div class="relative w-full max-w-[300px] mx-auto h-[48px] rounded-[24px] glass-panel flex items-center px-md">
<span class="material-symbols-outlined text-outline mr-sm" data-icon="search" style="font-size: 20px;">search</span>
<input class="bg-transparent border-none w-full text-on-surface placeholder:text-outline font-body-md text-body-md focus:ring-0 p-0" placeholder="搜索助手..." type="text"/>
</div>
</header>
<!-- Orbit Menu -->
<main class="flex-1 px-safe-margin py-md flex flex-col items-center justify-center pb-[120px]">
<div class="orbit-container">
<!-- Central Hub (Super Assistant + Add Button) -->
<div class="orbit-center flex flex-col items-center justify-center w-[140px] h-[140px] rounded-full bg-primary-container text-on-primary-container glow-effect cursor-pointer relative group">
<span class="material-symbols-outlined mb-2" data-icon="smart_toy" style="font-size: 48px;">smart_toy</span>
<h2 class="font-h2 text-h2 text-on-primary-container text-center leading-tight">超级助手</h2>
<p class="font-label-md text-label-md text-on-primary-container opacity-80 text-center mt-1">全能型</p>
<!-- + Button inside hub -->
<button class="absolute -bottom-4 right-2 w-[40px] h-[40px] rounded-full bg-surface text-on-surface shadow-md flex items-center justify-center hover:bg-surface-container-highest transition-colors focus:outline-none border border-outline-variant">
<span class="material-symbols-outlined" data-icon="add" style="font-size: 20px;">add</span>
</button>
</div>
<!-- Orbiting Agents -->
<!-- Orbit Item 1 (Placeholder for structural alignment, usually Super Assistant would be here but it's central now. Let's make an 'Empty Slot' or shift others) -->
<div class="orbit-item w-[80px] h-[80px] rounded-full glass-panel flex flex-col items-center justify-center cursor-pointer hover:bg-surface-container-highest transition-colors group border border-dashed border-outline-variant opacity-50">
<span class="material-symbols-outlined text-outline" data-icon="add" style="font-size: 24px;">add</span>
<span class="font-label-md text-[10px] text-outline mt-1">添加</span>
</div>
<!-- Orbit Item 2: Code Assistant -->
<div class="orbit-item w-[80px] h-[80px] rounded-full bg-tertiary-container text-on-tertiary-container flex flex-col items-center justify-center cursor-pointer shadow-md hover:scale-105 transition-transform group">
<span class="material-symbols-outlined mb-1" data-icon="code" style="font-size: 24px;">code</span>
<h2 class="font-label-md text-[11px] font-bold text-center leading-tight px-1">代码助手</h2>
</div>
<!-- Orbit Item 3: Translation Assistant -->
<div class="orbit-item w-[80px] h-[80px] rounded-full bg-secondary-container text-on-secondary-container flex flex-col items-center justify-center cursor-pointer shadow-md hover:scale-105 transition-transform group">
<span class="material-symbols-outlined mb-1" data-icon="translate" style="font-size: 24px;">translate</span>
<h2 class="font-label-md text-[11px] font-bold text-center leading-tight px-1">翻译助手</h2>
</div>
</div>
</main>
<!-- FAB (Removed as + button is inside hub, but keeping structural element commented out if needed) -->

<span class="material-symbols-outlined" data-icon="auto_awesome" style="font-size: 24px; font-variation-settings: 'FILL' 1;">auto_awesome</span>
</button> -->
<!-- Shared BottomNavBar -->
<div class="fixed bottom-0 left-0 right-0 z-50">
<div class="flex gap-2 border-t border-outline-variant bg-surface-container px-4 pb-6 pt-3 glass-panel">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-on-surface-variant hover:text-on-surface transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" data-icon="home" style="font-size: 24px;">home</span>
</div>
<p class="font-label-md text-label-md">首页</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center bg-surface-container-highest rounded-full w-16">
<span class="material-symbols-outlined" data-icon="chat" style="font-size: 24px; font-variation-settings: 'FILL' 1;">chat</span>
</div>
<p class="font-label-md text-label-md">对话</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-on-surface-variant hover:text-on-surface transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" data-icon="person" style="font-size: 24px;">person</span>
</div>
<p class="font-label-md text-label-md">我的</p>
</a>
</div>
</div>
</body></html>
