<body class="bg-background text-on-background min-h-screen pb-safe">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-zinc-950/70 backdrop-blur-3xl border-b border-white/10 shadow-none flex justify-between items-center h-16 px-5 w-full transition-transform">
<button class="text-zinc-400 hover:bg-white/5 active:scale-95 transition-transform p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="text-lg font-bold text-zinc-100 font-manrope tracking-wide">Settings</h1>
<button class="text-indigo-400 hover:bg-white/5 active:scale-95 transition-transform p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">account_circle</span>
</button>
</header>
<main class="pt-24 px-safe-margin pb-32 max-w-3xl mx-auto space-y-lg">
<!-- Header Section -->
<section class="space-y-sm">
<h2 class="font-h1 text-h1 text-on-surface">Add Provider</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Select a provider and configure the necessary credentials to integrate their services.</p>
</section>
<!-- Preset Cards Grid -->
<section class="space-y-md">
<h3 class="font-h2 text-h2 text-on-surface">Select Provider</h3>
<div class="grid grid-cols-2 md:grid-cols-3 gap-md">
<!-- Selected Card -->
<button class="flex flex-col items-center justify-center p-md rounded-xl bg-surface-container border border-primary-container relative overflow-hidden group shadow-[inset_0_0_10px_rgba(255,255,255,0.02)] transition-all">
<div class="absolute inset-0 bg-primary-container/10"></div>
<span class="material-symbols-outlined text-primary mb-sm text-3xl" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
<span class="font-label-md text-label-md text-on-surface">OpenAI</span>
<div class="absolute top-2 right-2 text-primary">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Unselected Cards -->
<button class="flex flex-col items-center justify-center p-md rounded-xl bg-surface/50 backdrop-blur-xl border border-white/10 hover:border-white/30 hover:shadow-[inset_0_0_15px_rgba(255,255,255,0.05)] transition-all active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant mb-sm text-3xl" style="font-variation-settings: 'FILL' 0;">psychology</span>
<span class="font-label-md text-label-md text-on-surface-variant">Anthropic</span>
</button>
<button class="flex flex-col items-center justify-center p-md rounded-xl bg-surface/50 backdrop-blur-xl border border-white/10 hover:border-white/30 hover:shadow-[inset_0_0_15px_rgba(255,255,255,0.05)] transition-all active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant mb-sm text-3xl" style="font-variation-settings: 'FILL' 0;">language</span>
<span class="font-label-md text-label-md text-on-surface-variant">Google</span>
</button>
<button class="flex flex-col items-center justify-center p-md rounded-xl bg-surface/50 backdrop-blur-xl border border-white/10 hover:border-white/30 hover:shadow-[inset_0_0_15px_rgba(255,255,255,0.05)] transition-all active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant mb-sm text-3xl" style="font-variation-settings: 'FILL' 0;">cloud</span>
<span class="font-label-md text-label-md text-on-surface-variant">Azure</span>
</button>
<button class="flex flex-col items-center justify-center p-md rounded-xl bg-surface/50 backdrop-blur-xl border border-white/10 hover:border-white/30 hover:shadow-[inset_0_0_15px_rgba(255,255,255,0.05)] transition-all active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant mb-sm text-3xl" style="font-variation-settings: 'FILL' 0;">api</span>
<span class="font-label-md text-label-md text-on-surface-variant">Cohere</span>
</button>
<button class="flex flex-col items-center justify-center p-md rounded-xl bg-surface/50 backdrop-blur-xl border border-white/10 hover:border-white/30 hover:shadow-[inset_0_0_15px_rgba(255,255,255,0.05)] transition-all active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant mb-sm text-3xl" style="font-variation-settings: 'FILL' 0;">memory</span>
<span class="font-label-md text-label-md text-on-surface-variant">Mistral</span>
</button>
</div>
</section>
<!-- Form Section -->
<section class="space-y-md bg-surface-container/30 backdrop-blur-2xl p-lg rounded-xl border border-white/10 shadow-[inset_0_0_20px_rgba(255,255,255,0.02)]">
<h3 class="font-h2 text-h2 text-on-surface mb-md">Configuration</h3>
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block">Provider Name</label>
<input class="w-full bg-surface-container border border-white/10 rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-surface-variant shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)]" type="text" value="OpenAI"/>
</div>
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block">Base URL</label>
<input class="w-full bg-surface-container border border-white/10 rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-on-surface-variant/50 shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)]" placeholder="https://api.openai.com/v1" type="text"/>
</div>
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block flex justify-between">
<span>API Key</span>
<span class="text-xs text-on-surface-variant/70">Securely stored</span>
</label>
<div class="relative">
<input class="w-full bg-surface-container border border-white/10 rounded-lg px-4 py-3 font-code text-code text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-on-surface-variant/50 shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)] pr-12" placeholder="sk-..." type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors p-1">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">visibility</span>
</button>
</div>
</div>
<!-- Vertex AI Specific Fields (Example of specialized fields) -->
<div class="pt-sm mt-sm border-t border-white/5 space-y-md opacity-50 pointer-events-none">
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block">Project ID (Vertex AI)</label>
<input class="w-full bg-surface-container/50 border border-white/5 rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface/50 focus:outline-none transition-colors shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)]" disabled="" placeholder="google-cloud-project-id" type="text"/>
</div>
</div>
</section>
</main>
<!-- Bottom Save Action -->
<div class="fixed bottom-0 w-full z-40 bg-background/90 backdrop-blur-xl border-t border-white/10 p-safe-margin pb-safe md:relative md:bg-transparent md:border-none md:p-0 md:mt-xl max-w-3xl mx-auto px-safe-margin md:pb-xl">
<button class="w-full bg-inverse-primary text-white font-label-md text-label-md rounded-xl py-4 flex items-center justify-center space-x-2 active:scale-[0.98] transition-transform shadow-lg">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">save</span>
<span>Save Provider Configuration</span>
</button>
</div>
