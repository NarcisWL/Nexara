<style>

            background: rgba(32, 31, 34, 0.4);
            backdrop-filter: blur(24px);

            border: 0.5px solid rgba(255, 255, 255, 0.1);

            background: rgba(255, 255, 255, 0.03);

        }

<body class="bg-background text-on-background min-h-screen font-body-md overflow-hidden relative">
<!-- Background Canvas (Simulating the chat interface behind the bottom sheet) -->
<div class="fixed inset-0 z-0 flex flex-col pt-20 px-safe-margin opacity-30 pointer-events-none">
<div class="flex justify-end mb-md">
<div class="bg-surface-container-high rounded-lg px-md py-sm max-w-[80%] border border-surface-variant">
<p class="font-body-md text-on-surface">Can you analyze this dataset and provide a summary of the key trends?</p>
</div>
</div>
<div class="flex justify-start mb-md">
<div class="max-w-[90%]">
<p class="font-body-md text-on-surface">I've analyzed the dataset. Here are the key trends I observed over the last quarter, broken down by region and product category.</p>
</div>
</div>
</div>
<!-- Scrim / Overlay -->
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40"></div>
<!-- GlassBottomSheet (70% height, 32px rounded corners) -->

<!-- Drag Handle & Header -->

<div class="w-12 h-1 bg-surface-variant rounded-full mb-md"></div>
<div class="flex justify-between items-center w-full">
<h2 class="font-h2 text-h2 text-on-surface">Session Settings</h2>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-outline">close</span>
</button>
</div>
</div>
<!-- Tabs Navigation -->
<div class="flex overflow-x-auto px-safe-margin pt-md pb-sm gap-lg border-b border-white/5 shrink-0 scrollbar-hide">
<!-- Active Tab: Model -->
<button class="flex flex-col items-center gap-xs relative pb-sm min-w-max group">
<span class="font-label-md text-label-md text-primary">Model</span>
<div class="absolute bottom-0 left-0 w-full h-0.5 bg-primary rounded-t-full"></div>
</button>
<!-- Inactive Tabs -->
<button class="flex flex-col items-center gap-xs relative pb-sm min-w-max group">
<span class="font-label-md text-label-md text-outline group-hover:text-on-surface transition-colors">Thinking Level</span>
</button>
<button class="flex flex-col items-center gap-xs relative pb-sm min-w-max group">
<span class="font-label-md text-label-md text-outline group-hover:text-on-surface transition-colors">Stats</span>
</button>
<button class="flex flex-col items-center gap-xs relative pb-sm min-w-max group">
<span class="font-label-md text-label-md text-outline group-hover:text-on-surface transition-colors">Tools</span>
</button>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto px-safe-margin py-lg gap-lg flex flex-col">
<!-- Tab Panel: Model (Currently Visible based on prompt) -->

<div class="relative w-full mb-md shrink-0">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-lg">search</span>
<input class="w-full bg-surface-container/50 backdrop-blur-md border-[0.5px] border-surface-variant rounded-lg py-sm pl-10 pr-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all shadow-inner" placeholder="Search models..." type="text"/>
</div>

<div class="absolute top-0 right-0 p-sm opacity-100 transition-opacity">
<span class="material-symbols-outlined icon-fill text-primary text-sm">check_circle</span>
</div>
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center border-[0.5px] border-primary/20">

</div>
<div>

</div>
</div>
<p class="font-body-md text-[13px] text-on-surface-variant leading-relaxed mt-xs">

<span class="px-2 py-0.5 rounded-full bg-surface-container border-[0.5px] border-surface-variant font-code text-[10px] text-outline">Vision</span>
<span class="px-2 py-0.5 rounded-full bg-surface-container border-[0.5px] border-surface-variant font-code text-[10px] text-outline">Fast</span>

</button>

</div>

<span class="px-2 py-0.5 rounded-full bg-surface-container border-[0.5px] border-surface-variant font-code text-[10px] text-outline">Coding</span>
<span class="px-2 py-0.5 rounded-full bg-surface-container border-[0.5px] border-surface-variant font-code text-[10px] text-outline">Nuance</span>

</button>

<div class="flex items-center gap-sm">
