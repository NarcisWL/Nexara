<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;family=Space+Grotesk:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#c8c5ca",
                        "on-background": "#e5e1e4",
                        "outline": "#908fa0",
                        "on-secondary": "#303033",
                        "primary-fixed": "#e1e0ff",
                        "on-tertiary-fixed-variant": "#703700",
                        "secondary-fixed": "#e4e1e6",
                        "on-primary-container": "#0d0096",
                        "on-tertiary-fixed": "#301400",
                        "secondary": "#c8c5ca",
                        "surface-tint": "#c0c1ff",
                        "on-secondary-container": "#b6b4b8",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "on-secondary-fixed-variant": "#47464a",
                        "on-error-container": "#ffdad6",
                        "outline-variant": "#464554",
                        "on-tertiary": "#4f2500",
                        "on-primary-fixed": "#07006c",
                        "primary-container": "#8083ff",
                        "inverse-on-surface": "#313032",
                        "surface-variant": "#353437",
                        "error": "#ffb4ab",
                        "surface-container-low": "#1c1b1d",
                        "surface": "#131315",
                        "error-container": "#93000a",
                        "on-primary": "#1000a9",
                        "surface-dim": "#131315",
                        "surface-container-highest": "#353437",
                        "tertiary-container": "#d97721",
                        "on-surface": "#e5e1e4",
                        "surface-container-high": "#2a2a2c",
                        "on-surface-variant": "#c7c4d7",
                        "inverse-primary": "#494bd6",
                        "background": "#131315",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-tertiary-container": "#452000",
                        "tertiary-fixed": "#ffdcc5",
                        "on-error": "#690005",
                        "tertiary": "#ffb783",
                        "primary": "#c0c1ff",
                        "surface-container": "#201f22",
                        "secondary-container": "#47464a",
                        "tertiary-fixed-dim": "#ffb783",
                        "inverse-surface": "#e5e1e4",
                        "surface-container-lowest": "#0e0e10",
                        "surface-bright": "#39393b",
                        "on-secondary-fixed": "#1b1b1e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "safe-margin": "20px",
                        "md": "16px",
                        "lg": "24px",
                        "xs": "4px",
                        "sm": "8px",
                        "unit": "4px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["inter"],
                        "h2": ["manrope"],
                        "label-md": ["inter"],
                        "h1": ["manrope"],
                        "code": ["spaceGrotesk"],
                        "body-lg": ["inter"]
                    },
                    "fontSize": {
                        "body-md": ["15px", {"lineHeight": "25px", "fontWeight": "400"}],
                        "h2": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-md": ["13px", {"lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "h1": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "code": ["14px", {"lineHeight": "22px", "fontWeight": "400"}],
                        "body-lg": ["17px", {"lineHeight": "26px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-custom {
            animation: spin-slow 1.5s linear infinite;
        }
        .glass-glow {
            background: radial-gradient(circle at center, rgba(192, 193, 255, 0.08) 0%, transparent 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Background Layer with subtle glassmorphic depth -->
<div class="fixed inset-0 z-0 glass-glow pointer-events-none"></div>
<!-- Main Content: Loading Indicator Container -->
<main class="relative z-10 flex flex-col items-center justify-center">
<!-- Professional Activity Indicator -->
<div class="relative w-24 h-24 flex items-center justify-center">
<!-- Static Outer Ring (Hairline Border) -->
<div class="absolute inset-0 rounded-full border-[0.5px] border-white/10"></div>
<!-- Pulse Effect (Background) -->
<div class="absolute inset-2 rounded-full bg-primary/5 blur-xl animate-pulse"></div>
<!-- Spinner SVG -->
<svg class="w-16 h-16 animate-spin-custom" viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<defs>
<lineargradient id="spinner-grad" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color: #c0c1ff; stop-opacity: 1"></stop>
<stop offset="100%" style="stop-color: #494bd6; stop-opacity: 0.1"></stop>
</lineargradient>
</defs>
<circle cx="50" cy="50" fill="none" r="40" stroke="url(#spinner-grad)" stroke-dasharray="160 80" stroke-linecap="round" stroke-width="3"></circle>
</svg>
<!-- Center Brand Core (Static) -->
<div class="absolute w-2 h-2 rounded-full bg-primary shadow-[0_0_12px_rgba(192,193,255,0.8)]"></div>
</div>
<!-- Semantic Identity Wrapper (Hidden for visual minimalism, used for structural branding) -->
<div class="mt-xl text-center space-y-sm">
<h1 class="font-h1 text-h1 tracking-tighter text-on-background opacity-0 pointer-events-none select-none">
                Nexara
            </h1>
</div>
</main>
<!-- Initializing Text: Low Emphasis -->
<footer class="fixed bottom-12 w-full flex justify-center">
<div class="flex items-center gap-xs">
<p class="font-label-md text-label-md text-tertiary tracking-[0.15em] opacity-60">
                Initializing...
            </p>
</div>
</footer>
<!-- Decorative Corner Accents (Precision Hairlines) -->
<div class="fixed top-0 left-0 w-24 h-24 border-t-[0.5px] border-l-[0.5px] border-white/5 m-safe-margin rounded-tl-xl pointer-events-none"></div>
<div class="fixed bottom-0 right-0 w-24 h-24 border-b-[0.5px] border-r-[0.5px] border-white/5 m-safe-margin rounded-br-xl pointer-events-none"></div>
</body></html>
